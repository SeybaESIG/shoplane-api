services:
  db:
    image: postgres:16
    container_name: shoplane_postgres
    restart: unless-stopped
    env_file:
      - .env
    environment:
      POSTGRES_DB: ${POSTGRES_DB}
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
    ports:
      - "${POSTGRES_PORT:-5432}:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER} -d ${POSTGRES_DB}"]
      interval: 5s
      timeout: 5s
      retries: 10

  redis:
    image: redis:7-alpine
    container_name: shoplane_redis
    restart: unless-stopped
    ports:
      - "6379:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 5s
      retries: 10

  migrate:
    build:
      context: .
      dockerfile: Dockerfile
    env_file:
      - .env
    environment:
      POSTGRES_HOST: db
      POSTGRES_PORT: 5432
      REDIS_URL: redis://redis:6379/0
    depends_on:
      db:
        condition: service_healthy
    command: python manage.py migrate --noinput
    restart: "no"

  web:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: shoplane_web
    restart: unless-stopped
    env_file:
      - .env
    environment:
      POSTGRES_HOST: db
      POSTGRES_PORT: 5432
      REDIS_URL: redis://redis:6379/0
    volumes:
      - .:/app
    ports:
      - "8000:8000"
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_healthy
      migrate:
        condition: service_completed_successfully
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://localhost:8000/api/v1/health/')"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 15s
    command: python manage.py runserver 0.0.0.0:8000

  # ---------------------------------------------------------------------------
  # Stripe CLI webhook forwarder — only active with: docker compose --profile stripe up
  # Forwards Stripe events to the local web service during development.
  # Requires STRIPE_SECRET_KEY to be set in .env.
  # ---------------------------------------------------------------------------
  stripe-cli:
    image: stripe/stripe-cli:latest
    profiles: [stripe]
    env_file:
      - .env
    environment:
      STRIPE_API_KEY: ${STRIPE_SECRET_KEY}
    command: listen --forward-to http://web:8000/api/v1/webhooks/stripe/
    depends_on:
      web:
        condition: service_healthy

volumes:
  postgres_data:
